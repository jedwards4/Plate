<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plate — Nutrition Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --bg:#F3F4EE;
    --surface:#FFFFFF;
    --surface-alt:#EAEDE4;
    --ink:#20281F;
    --ink-soft:#657064;
    --ink-faint:#9AA396;
    --primary:#2F5D50;
    --primary-soft:#DCE8E1;
    --protein:#8B5A9F;
    --protein-soft:#EEE3F2;
    --carbs:#C7912E;
    --carbs-soft:#F5EAD3;
    --fat:#4C7FA6;
    --fat-soft:#DFEAF2;
    --danger:#B5453A;
    --border:#E0E3D9;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior-y:none;
  }
  .num{font-family:'Manrope',system-ui,sans-serif;}
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  header.topbar{
    padding:18px 20px 10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'Manrope',sans-serif;
    font-weight:800;
    font-size:19px;
    letter-spacing:-0.01em;
  }
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--primary);}
  .date-nav{
    display:flex;
    align-items:center;
    gap:10px;
    padding:2px 20px 16px;
  }
  .date-nav button{
    width:32px;height:32px;border-radius:10px;border:1px solid var(--border);
    background:var(--surface);color:var(--ink-soft);font-size:16px;cursor:pointer;
  }
  .date-nav .date-label{
    flex:1;text-align:center;font-weight:600;font-size:14.5px;color:var(--ink);
    padding:6px 10px;border-radius:10px;
  }
  .date-nav .date-label.today-pill{color:var(--primary);}
  main{flex:1;padding:0 20px 100px;overflow-y:auto;}

  /* ---- Ring ---- */
  .ring-card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:22px;
    display:flex;
    align-items:center;
    gap:20px;
    border:1px solid var(--border);
  }
  .ring-wrap{position:relative;width:132px;height:132px;flex-shrink:0;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-center{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  .ring-center .val{font-size:26px;font-weight:800;line-height:1;}
  .ring-center .lbl{font-size:11px;color:var(--ink-soft);margin-top:4px;text-transform:uppercase;letter-spacing:.04em;}
  .ring-side{flex:1;display:flex;flex-direction:column;gap:8px;}
  .ring-side .row{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-soft);}
  .ring-side .row b{color:var(--ink);font-weight:700;}

  .macro-bars{display:flex;flex-direction:column;gap:12px;margin-top:14px;}
  .macro-bar-card{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;
  }
  .macro-bar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:7px;}
  .macro-bar-top .name{font-weight:600;display:flex;align-items:center;gap:7px;}
  .macro-bar-top .swatch{width:9px;height:9px;border-radius:50%;}
  .macro-bar-top .amt{color:var(--ink-soft);font-family:'Manrope',sans-serif;font-weight:700;}
  .track{height:8px;border-radius:6px;background:var(--surface-alt);overflow:hidden;}
  .fill{height:100%;border-radius:6px;transition:width .3s ease;}

  .section-title{
    font-size:12.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;
    letter-spacing:.05em;margin:26px 2px 10px;display:flex;justify-content:space-between;align-items:center;
  }
  .section-title button{
    background:none;border:none;color:var(--primary);font-weight:700;font-size:12.5px;
    text-transform:none;letter-spacing:0;cursor:pointer;padding:0;
  }

  .meal-item{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;
  }
  .meal-item .left{display:flex;flex-direction:column;gap:3px;}
  .meal-item .left .name{font-weight:600;font-size:14.5px;}
  .meal-item .left .macros{font-size:12px;color:var(--ink-soft);}
  .meal-item .right{display:flex;align-items:center;gap:10px;}
  .meal-item .cal{font-family:'Manrope',sans-serif;font-weight:700;font-size:14.5px;}
  .meal-item .del{background:none;border:none;color:var(--ink-faint);font-size:17px;cursor:pointer;padding:2px 4px;}
  .empty-state{
    text-align:center;color:var(--ink-faint);font-size:13.5px;padding:30px 10px;
    border:1.5px dashed var(--border);border-radius:12px;
  }

  .fab{
    position:fixed;left:50%;transform:translateX(-50%);bottom:78px;
    width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;
    border:none;font-size:28px;box-shadow:0 6px 18px rgba(47,93,80,.35);cursor:pointer;
    display:flex;align-items:center;justify-content:center;z-index:20;
    max-width:480px;
  }

  nav.tabbar{
    position:sticky;bottom:0;left:0;right:0;
    background:var(--surface);border-top:1px solid var(--border);
    display:flex;padding:10px 10px calc(10px + env(safe-area-inset-bottom));
    max-width:480px;margin:0 auto;width:100%;
  }
  nav.tabbar button{
    flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;
    color:var(--ink-faint);font-size:11px;font-weight:600;cursor:pointer;padding:4px;
  }
  nav.tabbar button.active{color:var(--primary);}
  nav.tabbar svg{width:21px;height:21px;}

  /* ---- Weight tab ---- */
  .weight-hero{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px;
  }
  .weight-hero .cur{font-size:34px;font-weight:800;}
  .weight-hero .delta{font-size:13px;color:var(--ink-soft);margin-top:2px;}
  .chart-wrap{margin-top:14px;}
  .weight-row{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;
  }
  .weight-row .d{font-size:13px;color:var(--ink-soft);}
  .weight-row .w{font-family:'Manrope',sans-serif;font-weight:700;font-size:15px;}

  /* ---- Settings ---- */
  .settings-card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:6px 16px;margin-bottom:16px;
  }
  .settings-row{
    display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);
  }
  .settings-row:last-child{border-bottom:none;}
  .settings-row label{font-size:14.5px;font-weight:500;}
  .settings-row input[type=number]{
    width:78px;text-align:right;border:1px solid var(--border);border-radius:8px;padding:7px 9px;
    font-family:'Manrope',sans-serif;font-weight:700;font-size:14px;background:var(--surface-alt);color:var(--ink);
  }
  .unit-toggle{display:flex;background:var(--surface-alt);border-radius:9px;padding:3px;}
  .unit-toggle button{border:none;background:none;padding:6px 12px;border-radius:7px;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;}
  .unit-toggle button.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .danger-btn{
    width:100%;background:none;border:1px solid var(--danger);color:var(--danger);
    border-radius:12px;padding:13px;font-weight:600;font-size:14px;cursor:pointer;margin-top:6px;
  }

  /* ---- Modal ---- */
  .overlay{
    position:fixed;inset:0;background:rgba(20,26,19,.45);z-index:50;
    display:flex;align-items:flex-end;justify-content:center;
  }
  .sheet{
    background:var(--bg);width:100%;max-width:480px;border-radius:20px 20px 0 0;
    max-height:88vh;overflow-y:auto;padding:18px 20px calc(24px + env(safe-area-inset-bottom));
    animation:slideup .22s ease;
  }
  @keyframes slideup{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .sheet-head h2{font-size:17px;font-weight:800;font-family:'Manrope',sans-serif;margin:0;}
  .sheet-head button{background:none;border:none;font-size:22px;color:var(--ink-faint);cursor:pointer;}

  .seg{display:flex;background:var(--surface-alt);border-radius:11px;padding:3px;margin-bottom:16px;}
  .seg button{flex:1;border:none;background:none;padding:9px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;}
  .seg button.active{background:var(--surface);color:var(--primary);box-shadow:0 1px 3px rgba(0,0,0,.08);}

  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .field input{
    width:100%;border:1px solid var(--border);border-radius:11px;padding:12px 13px;
    font-size:15px;background:var(--surface);color:var(--ink);font-family:'Inter',sans-serif;
  }
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}

  .scan-btn{
    width:100%;background:var(--primary-soft);color:var(--primary);border:none;
    border-radius:12px;padding:13px;font-weight:700;font-size:14.5px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;
  }
  .primary-btn{
    width:100%;background:var(--primary);color:#fff;border:none;border-radius:12px;
    padding:14px;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px;
  }
  .primary-btn:disabled{opacity:.5;}
  .fav-chip{
    display:inline-flex;align-items:center;background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:8px 13px;font-size:13px;font-weight:600;margin:0 6px 6px 0;cursor:pointer;
  }
  .fav-scroll{display:flex;flex-wrap:wrap;margin-bottom:14px;}
  .lookup-card{
    background:var(--surface-alt);border-radius:12px;padding:13px 14px;margin-bottom:14px;font-size:13px;color:var(--ink-soft);
  }
  .lookup-card b{color:var(--ink);}

  /* scanner overlay */
  .scan-overlay{position:fixed;inset:0;background:#000;z-index:60;display:flex;flex-direction:column;}
  #scanner-video{width:100%;flex:1;}
  .scan-overlay .scan-top{
    position:absolute;top:0;left:0;right:0;padding:16px 18px;display:flex;justify-content:space-between;
    align-items:center;z-index:2;
  }
  .scan-overlay .scan-top span{color:#fff;font-weight:600;font-size:14px;}
  .scan-overlay .scan-top button{background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;}
  .scan-hint{position:absolute;bottom:34px;left:0;right:0;text-align:center;color:#fff;font-size:13px;opacity:.85;z-index:2;}

  .toast{
    position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:11px 18px;border-radius:30px;font-size:13.5px;z-index:80;max-width:85%;text-align:center;
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------------- Storage helpers ---------------- */
async function sGet(key){
  try{ const r = await window.storage.get(key, false); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function sSet(key, val){
  try{ await window.storage.set(key, JSON.stringify(val), false); }catch(e){ console.error('storage set failed', e); }
}

/* ---------------- State ---------------- */
const state = {
  tab: 'today',
  currentDate: todayStr(),
  settings: { calories:2000, protein:150, carbs:200, fat:65, weightUnit:'lb' },
  logsCache: {},         // date -> entries[]
  weightLog: [],         // {id,date,weight}
  favorites: [],         // {id,name,calories,protein,carbs,fat,servingLabel}
  modal: null,           // 'add' | 'weight' | null
  addTabMode: 'manual',  // 'manual' | 'lookup-result'
  scanResult: null,
  scanning: false,
  toastMsg: null,
};
let html5QrInstance = null;

function todayStr(d){ const dt = d?new Date(d):new Date(); return dt.toISOString().slice(0,10); }
function fmtDateLabel(dstr){
  const d = new Date(dstr+'T00:00:00');
  const t = new Date(todayStr()+'T00:00:00');
  const diff = Math.round((d-t)/86400000);
  if(diff===0) return 'Today';
  if(diff===-1) return 'Yesterday';
  if(diff===1) return 'Tomorrow';
  return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
}
function shiftDate(dstr, delta){
  const d = new Date(dstr+'T00:00:00'); d.setDate(d.getDate()+delta); return todayStr(d);
}
function round1(n){ return Math.round(n*10)/10; }

/* ---------------- Data access ---------------- */
async function getDayEntries(date){
  if(state.logsCache[date]) return state.logsCache[date];
  const v = await sGet('log:'+date) || [];
  state.logsCache[date] = v;
  return v;
}
async function saveDayEntries(date, entries){
  state.logsCache[date] = entries;
  await sSet('log:'+date, entries);
}

/* ---------------- Init ---------------- */
async function init(){
  const settings = await sGet('settings');
  if(settings) state.settings = Object.assign(state.settings, settings);
  state.weightLog = await sGet('weight-log') || [];
  state.favorites = await sGet('favorites') || [];
  await getDayEntries(state.currentDate);
  render();
}

/* ---------------- Icons ---------------- */
const ICONS = {
  today: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M8 2v4M16 2v4M3 9h18"/></svg>',
  weight: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M9 4h6l-1 3H10z"/><path d="M9.5 17l2.5-5 2.5 5"/></svg>',
  settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 11-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 110-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 114 0v.09c0 .68.4 1.29 1 1.51.6.24 1.3.1 1.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06c-.43.52-.57 1.22-.33 1.82.22.6.83 1 1.51 1H21a2 2 0 110 4h-.09c-.68 0-1.29.4-1.51 1z"/></svg>',
  camera: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>',
  close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>',
};

/* ---------------- Render ---------------- */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderTop()}
    <main>${state.tab==='today'?renderToday():state.tab==='weight'?renderWeight():renderSettings()}</main>
    ${state.tab==='today' ? `<button class="fab" data-action="open-add">+</button>` : ''}
    ${renderTabbar()}
    ${state.modal==='add' ? renderAddModal() : ''}
    ${state.modal==='weight' ? renderWeightModal() : ''}
    ${state.scanning ? renderScanOverlay() : ''}
    ${state.toastMsg ? `<div class="toast">${escapeHtml(state.toastMsg)}</div>` : ''}
  `;
  bindEvents();
  if(state.scanning) startScanner();
}

function renderTop(){
  return `
  <header class="topbar">
    <div class="brand"><span class="dot"></span>Plate</div>
  </header>`;
}

function renderTabbar(){
  const tabs = [['today','Today','today'],['weight','Weight','weight'],['settings','Settings','settings']];
  return `<nav class="tabbar">
    ${tabs.map(([id,label,icon])=>`
      <button data-tab="${id}" class="${state.tab===id?'active':''}">
        ${ICONS[icon]}<span>${label}</span>
      </button>`).join('')}
  </nav>`;
}

function renderToday(){
  const entries = state.logsCache[state.currentDate] || [];
  const totals = entries.reduce((a,e)=>({
    calories:a.calories+num(e.calories), protein:a.protein+num(e.protein),
    carbs:a.carbs+num(e.carbs), fat:a.fat+num(e.fat)
  }), {calories:0,protein:0,carbs:0,fat:0});
  const t = state.settings;
  const remain = Math.round(t.calories - totals.calories);
  const pct = Math.max(0, Math.min(1, totals.calories / Math.max(1,t.calories)));
  const r = 54, c = 2*Math.PI*r;
  const dash = c*pct;

  const macroRow = (label, color, soft, val, target)=>{
    const p = Math.max(0, Math.min(1, val/Math.max(1,target)));
    return `<div class="macro-bar-card">
      <div class="macro-bar-top">
        <span class="name"><span class="swatch" style="background:${color}"></span>${label}</span>
        <span class="amt">${Math.round(val)} / ${Math.round(target)}g</span>
      </div>
      <div class="track"><div class="fill" style="width:${p*100}%;background:${color}"></div></div>
    </div>`;
  };

  return `
    <div class="date-nav">
      <button data-action="prev-day">‹</button>
      <div class="date-label ${state.currentDate===todayStr()?'today-pill':''}">${fmtDateLabel(state.currentDate)}</div>
      <button data-action="next-day">›</button>
    </div>

    <div class="ring-card">
      <div class="ring-wrap">
        <svg width="132" height="132" viewBox="0 0 132 132">
          <circle cx="66" cy="66" r="${r}" fill="none" stroke="var(--surface-alt)" stroke-width="12"/>
          <circle cx="66" cy="66" r="${r}" fill="none" stroke="${remain<0?'var(--danger)':'var(--primary)'}" stroke-width="12"
            stroke-dasharray="${dash} ${c}" stroke-linecap="round"/>
        </svg>
        <div class="ring-center">
          <div class="val num">${Math.abs(remain)}</div>
          <div class="lbl">${remain<0?'over':'left'}</div>
        </div>
      </div>
      <div class="ring-side">
        <div class="row"><span>Eaten</span><b class="num">${Math.round(totals.calories)}</b></div>
        <div class="row"><span>Target</span><b class="num">${Math.round(t.calories)}</b></div>
        <div class="row"><span>Logged</span><b class="num">${entries.length} item${entries.length===1?'':'s'}</b></div>
      </div>
    </div>

    <div class="macro-bars">
      ${macroRow('Protein','var(--protein)','var(--protein-soft)',totals.protein,t.protein)}
      ${macroRow('Carbs','var(--carbs)','var(--carbs-soft)',totals.carbs,t.carbs)}
      ${macroRow('Fat','var(--fat)','var(--fat-soft)',totals.fat,t.fat)}
    </div>

    <div class="section-title">Logged</div>
    ${entries.length===0 ? `<div class="empty-state">Nothing logged yet. Tap + to add a meal or scan a barcode.</div>` :
      entries.map(e=>`
        <div class="meal-item">
          <div class="left">
            <div class="name">${escapeHtml(e.name)}</div>
            <div class="macros">P ${round1(num(e.protein))} · C ${round1(num(e.carbs))} · F ${round1(num(e.fat))}</div>
          </div>
          <div class="right">
            <div class="cal">${Math.round(num(e.calories))}</div>
            <button class="del" data-action="del-entry" data-id="${e.id}">${ICONS.close}</button>
          </div>
        </div>`).join('')}
  `;
}

function renderWeight(){
  const log = [...state.weightLog].sort((a,b)=>a.date.localeCompare(b.date));
  const unit = state.settings.weightUnit;
  const last = log[log.length-1];
  const prev = log[log.length-2];
  const delta = last && prev ? round1(last.weight - prev.weight) : null;
  return `
    <div class="section-title" style="margin-top:20px;">Trend</div>
    <div class="weight-hero">
      <div class="cur num">${last?round1(last.weight):'—'} <span style="font-size:16px;color:var(--ink-soft);font-weight:600;">${unit}</span></div>
      <div class="delta">${last?('as of '+fmtDateLabel(last.date)):'No entries yet'}${delta!==null?` · ${delta>0?'+':''}${delta} ${unit} vs previous`:''}</div>
      <div class="chart-wrap">${renderWeightChart(log)}</div>
    </div>
    <div class="section-title">
      History
      <button data-action="open-weight">+ Add entry</button>
    </div>
    ${log.length===0 ? `<div class="empty-state">No weigh-ins yet.</div>` :
      [...log].reverse().map(w=>`
        <div class="weight-row">
          <span class="d">${fmtDateLabel(w.date)}</span>
          <span class="w num">${round1(w.weight)} ${unit}</span>
          <button class="del" data-action="del-weight" data-id="${w.id}">${ICONS.close}</button>
        </div>`).join('')}
  `;
}

function renderWeightChart(log){
  if(log.length<2){
    return `<div style="height:80px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:12.5px;">Log a couple more entries to see your trend</div>`;
  }
  const pts = log.slice(-30);
  const vals = pts.map(p=>p.weight);
  const min = Math.min(...vals), max = Math.max(...vals);
  const span = (max-min)||1;
  const W = 400, H = 90, pad = 8;
  const coords = pts.map((p,i)=>{
    const x = pad + (i/(pts.length-1))*(W-pad*2);
    const y = H-pad - ((p.weight-min)/span)*(H-pad*2);
    return [x,y];
  });
  const line = coords.map((c,i)=>(i===0?'M':'L')+c[0].toFixed(1)+','+c[1].toFixed(1)).join(' ');
  const area = line + ` L${coords[coords.length-1][0].toFixed(1)},${H} L${coords[0][0].toFixed(1)},${H} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="90" preserveAspectRatio="none">
    <path d="${area}" fill="var(--primary-soft)" stroke="none"/>
    <path d="${line}" fill="none" stroke="var(--primary)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function renderSettings(){
  const s = state.settings;
  return `
    <div class="section-title" style="margin-top:20px;">Daily targets</div>
    <div class="settings-card">
      ${settingsNumRow('calories','Calories', s.calories)}
      ${settingsNumRow('protein','Protein (g)', s.protein)}
      ${settingsNumRow('carbs','Carbs (g)', s.carbs)}
      ${settingsNumRow('fat','Fat (g)', s.fat)}
    </div>

    <div class="section-title">Units</div>
    <div class="settings-card">
      <div class="settings-row">
        <label>Weight unit</label>
        <div class="unit-toggle">
          <button data-action="unit" data-unit="lb" class="${s.weightUnit==='lb'?'active':''}">lb</button>
          <button data-action="unit" data-unit="kg" class="${s.weightUnit==='kg'?'active':''}">kg</button>
        </div>
      </div>
    </div>

    <div class="section-title">Data</div>
    <button class="danger-btn" data-action="clear-data">Clear all data</button>
  `;
}
function settingsNumRow(key,label,val){
  return `<div class="settings-row">
    <label>${label}</label>
    <input type="number" inputmode="decimal" data-action="set-target" data-key="${key}" value="${val}">
  </div>`;
}

/* ---------------- Add Entry Modal ---------------- */
function renderAddModal(){
  const favs = state.favorites;
  return `
  <div class="overlay" data-action="close-overlay">
    <div class="sheet" data-stop="1">
      <div class="sheet-head">
        <h2>Add food</h2>
        <button data-action="close-modal">${ICONS.close}</button>
      </div>

      <button class="scan-btn" data-action="start-scan">${ICONS.camera} Scan barcode</button>

      ${favs.length ? `
        <div class="field"><label>Quick add</label></div>
        <div class="fav-scroll">
          ${favs.map(f=>`<div class="fav-chip" data-action="add-fav" data-id="${f.id}">${escapeHtml(f.name)}</div>`).join('')}
        </div>` : ''}

      ${state.scanResult ? renderLookupCard(state.scanResult) : ''}

      <div class="field"><label>Food name</label>
        <input id="f-name" type="text" placeholder="e.g. Grilled chicken breast" value="${escapeHtml(state.draft?.name||'')}">
      </div>
      <div class="field-row">
        <div class="field"><label>Calories</label><input id="f-cal" type="number" inputmode="decimal" value="${state.draft?.calories??''}"></div>
        <div class="field"><label>Protein (g)</label><input id="f-pro" type="number" inputmode="decimal" value="${state.draft?.protein??''}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Carbs (g)</label><input id="f-carb" type="number" inputmode="decimal" value="${state.draft?.carbs??''}"></div>
        <div class="field"><label>Fat (g)</label><input id="f-fat" type="number" inputmode="decimal" value="${state.draft?.fat??''}"></div>
      </div>

      <button class="primary-btn" data-action="save-entry">Add to today's log</button>
    </div>
  </div>`;
}

function renderLookupCard(r){
  if(r.error){
    return `<div class="lookup-card">Couldn't find that barcode (<b>${escapeHtml(r.code)}</b>). Enter it manually below.</div>`;
  }
  return `<div class="lookup-card">Found <b>${escapeHtml(r.name)}</b> — values filled in below${r.per?` (per ${r.per})`:''}. Adjust if needed before adding.</div>`;
}

/* ---------------- Weight Modal ---------------- */
function renderWeightModal(){
  return `
  <div class="overlay" data-action="close-overlay">
    <div class="sheet" data-stop="1">
      <div class="sheet-head">
        <h2>Log weight</h2>
        <button data-action="close-modal">${ICONS.close}</button>
      </div>
      <div class="field"><label>Date</label>
        <input id="w-date" type="date" value="${todayStr()}" max="${todayStr()}">
      </div>
      <div class="field"><label>Weight (${state.settings.weightUnit})</label>
        <input id="w-val" type="number" inputmode="decimal" placeholder="0.0">
      </div>
      <button class="primary-btn" data-action="save-weight">Save</button>
    </div>
  </div>`;
}

/* ---------------- Scanner overlay ---------------- */
function renderScanOverlay(){
  return `
  <div class="scan-overlay">
    <div class="scan-top">
      <span>Scan a barcode</span>
      <button data-action="stop-scan">${ICONS.close}</button>
    </div>
    <div id="scanner-video"></div>
    <div class="scan-hint">Align the barcode within the frame</div>
  </div>`;
}

async function startScanner(){
  if(typeof Html5Qrcode === 'undefined'){
    showToast("Camera library failed to load — check your connection.");
    state.scanning = false; render(); return;
  }
  try{
    html5QrInstance = new Html5Qrcode("scanner-video", { verbose:false });
    const formats = [
      Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128
    ];
    await html5QrInstance.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 260, height: 140 }, formatsToSupport: formats },
      onScanDetected,
      ()=>{}
    );
  }catch(err){
    showToast("Couldn't access camera. Check permissions and try again.");
    state.scanning = false; render();
  }
}
async function stopScanner(){
  if(html5QrInstance){
    try{ await html5QrInstance.stop(); html5QrInstance.clear(); }catch(e){}
    html5QrInstance = null;
  }
}
async function onScanDetected(decodedText){
  await stopScanner();
  state.scanning = false;
  showToast("Looking up product…");
  render();
  await lookupBarcode(decodedText);
}

async function lookupBarcode(code){
  try{
    const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(code)}.json`);
    const data = await res.json();
    if(data.status!==1 || !data.product){
      state.scanResult = {error:true, code};
      state.toastMsg = null; render(); return;
    }
    const p = data.product;
    const n = p.nutriments || {};
    let cal, pro, carb, fat, per;
    if(n['energy-kcal_serving']!=null || n['proteins_serving']!=null){
      cal = n['energy-kcal_serving']; pro = n['proteins_serving']; carb = n['carbohydrates_serving']; fat = n['fat_serving'];
      per = p.serving_size || 'serving';
    } else {
      cal = n['energy-kcal_100g']; pro = n['proteins_100g']; carb = n['carbohydrates_100g']; fat = n['fat_100g'];
      per = '100g';
    }
    state.scanResult = { name: p.product_name || 'Unknown product', per, code };
    state.draft = {
      name: p.product_name || 'Scanned item',
      calories: cal!=null?Math.round(cal):'',
      protein: pro!=null?round1(pro):'',
      carbs: carb!=null?round1(carb):'',
      fat: fat!=null?round1(fat):''
    };
    state.toastMsg = null;
    render();
  }catch(e){
    state.scanResult = {error:true, code};
    state.toastMsg = null;
    render();
  }
}

/* ---------------- Actions ---------------- */
function num(v){ const n = parseFloat(v); return isNaN(n)?0:n; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg){
  state.toastMsg = msg;
  render();
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=>{ state.toastMsg=null; render(); }, 2600);
}

function bindEvents(){
  const app = document.getElementById('app');

  app.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click', ()=>{
    state.tab = el.dataset.tab; state.modal=null; render();
  }));

  const prevBtn = app.querySelector('[data-action="prev-day"]');
  if(prevBtn) prevBtn.addEventListener('click', async ()=>{
    state.currentDate = shiftDate(state.currentDate,-1); await getDayEntries(state.currentDate); render();
  });
  const nextBtn = app.querySelector('[data-action="next-day"]');
  if(nextBtn) nextBtn.addEventListener('click', async ()=>{
    state.currentDate = shiftDate(state.currentDate,1); await getDayEntries(state.currentDate); render();
  });

  const openAdd = app.querySelector('[data-action="open-add"]');
  if(openAdd) openAdd.addEventListener('click', ()=>{
    state.modal='add'; state.scanResult=null; state.draft=null; render();
  });
  const openWeight = app.querySelector('[data-action="open-weight"]');
  if(openWeight) openWeight.addEventListener('click', ()=>{ state.modal='weight'; render(); });

  app.querySelectorAll('[data-action="close-modal"]').forEach(el=>el.addEventListener('click', closeModal));
  app.querySelectorAll('[data-action="close-overlay"]').forEach(el=>el.addEventListener('click', (e)=>{
    if(e.target===el) closeModal();
  }));
  app.querySelectorAll('[data-stop]').forEach(el=>el.addEventListener('click', e=>e.stopPropagation()));

  app.querySelectorAll('[data-action="del-entry"]').forEach(el=>el.addEventListener('click', async ()=>{
    const id = el.dataset.id;
    const entries = (state.logsCache[state.currentDate]||[]).filter(e=>e.id!==id);
    await saveDayEntries(state.currentDate, entries); render();
  }));

  app.querySelectorAll('[data-action="del-weight"]').forEach(el=>el.addEventListener('click', async ()=>{
    const id = el.dataset.id;
    state.weightLog = state.weightLog.filter(w=>w.id!==id);
    await sSet('weight-log', state.weightLog); render();
  }));

  app.querySelectorAll('[data-action="add-fav"]').forEach(el=>el.addEventListener('click', async ()=>{
    const f = state.favorites.find(x=>x.id===el.dataset.id);
    if(!f) return;
    const entries = state.logsCache[state.currentDate]||[];
    entries.push({ id:'e'+Date.now(), name:f.name, calories:f.calories, protein:f.protein, carbs:f.carbs, fat:f.fat, time:Date.now() });
    await saveDayEntries(state.currentDate, entries);
    closeModal(); showToast('Added '+f.name);
  }));

  const startScan = app.querySelector('[data-action="start-scan"]');
  if(startScan) startScan.addEventListener('click', ()=>{ state.scanning=true; render(); });
  const stopScan = app.querySelector('[data-action="stop-scan"]');
  if(stopScan) stopScan.addEventListener('click', async ()=>{ await stopScanner(); state.scanning=false; render(); });

  const saveEntryBtn = app.querySelector('[data-action="save-entry"]');
  if(saveEntryBtn) saveEntryBtn.addEventListener('click', async ()=>{
    const name = document.getElementById('f-name').value.trim();
    if(!name){ showToast('Give it a name first'); return; }
    const entry = {
      id:'e'+Date.now(), name,
      calories:num(document.getElementById('f-cal').value),
      protein:num(document.getElementById('f-pro').value),
      carbs:num(document.getElementById('f-carb').value),
      fat:num(document.getElementById('f-fat').value),
      time:Date.now()
    };
    const entries = state.logsCache[state.currentDate]||[];
    entries.push(entry);
    await saveDayEntries(state.currentDate, entries);

    if(!state.favorites.some(f=>f.name.toLowerCase()===name.toLowerCase())){
      state.favorites.unshift({id:'f'+Date.now(), name:entry.name, calories:entry.calories, protein:entry.protein, carbs:entry.carbs, fat:entry.fat});
      state.favorites = state.favorites.slice(0,12);
      await sSet('favorites', state.favorites);
    }
    closeModal(); showToast('Added to log');
  });

  const saveWeightBtn = app.querySelector('[data-action="save-weight"]');
  if(saveWeightBtn) saveWeightBtn.addEventListener('click', async ()=>{
    const date = document.getElementById('w-date').value || todayStr();
    const val = num(document.getElementById('w-val').value);
    if(!val){ showToast('Enter a weight'); return; }
    state.weightLog = state.weightLog.filter(w=>w.date!==date);
    state.weightLog.push({id:'w'+Date.now(), date, weight:val});
    await sSet('weight-log', state.weightLog);
    closeModal(); showToast('Weight logged');
  });

  app.querySelectorAll('[data-action="set-target"]').forEach(el=>el.addEventListener('change', async ()=>{
    state.settings[el.dataset.key] = num(el.value);
    await sSet('settings', state.settings); render();
  }));
  app.querySelectorAll('[data-action="unit"]').forEach(el=>el.addEventListener('click', async ()=>{
    state.settings.weightUnit = el.dataset.unit;
    await sSet('settings', state.settings); render();
  }));

  const clearBtn = app.querySelector('[data-action="clear-data"]');
  if(clearBtn) clearBtn.addEventListener('click', ()=>{
    if(confirm('This will permanently delete all logged food, weight history, and settings. Continue?')){
      clearAllData();
    }
  });
}

function closeModal(){
  state.modal=null; state.scanResult=null; state.draft=null; render();
}

async function clearAllData(){
  try{
    const keys = await window.storage.list('', false);
    if(keys && keys.keys){
      for(const k of keys.keys){ await window.storage.delete(k, false); }
    }
  }catch(e){}
  state.settings = { calories:2000, protein:150, carbs:200, fat:65, weightUnit:'lb' };
  state.logsCache = {}; state.weightLog=[]; state.favorites=[];
  showToast('All data cleared');
}

init();
</script>
</body>
</html>
